<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BINGO BINGO 賓果預測系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --bg-primary: #0b0a0f;
  --bg-secondary: #131118;
  --bg-card: #1a1726;
  --bg-card-hover: #231f30;
  --accent-gold: #ffd700;
  --accent-gold2: #f0a500;
  --accent-cyan: #e8c547;
  --accent-pink: #ff6b9d;
  --accent-green: #50fa7b;
  --accent-red: #ff5555;
  --accent-purple: #bd93f9;
  --text-primary: #fef3c7;
  --text-secondary: #b8a47c;
  --text-dim: #6b5c3e;
  --border: #2a2235;
  --border-gold: rgba(255, 215, 0, 0.25);
  --glow-gold: rgba(255, 215, 0, 0.4);
  --glow-warm: rgba(240, 165, 0, 0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 90%, rgba(240, 165, 0, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

#root { position: relative; z-index: 1; }

.app-header {
  background: linear-gradient(135deg, #1a1520 0%, #0f0d18 50%, #1a1520 100%);
  border-bottom: 1px solid var(--border-gold);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 20px rgba(255, 215, 0, 0.08);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, #ffd700, #f0a500, #d4850a);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 16px;
  color: #1a0a00;
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  border: 1px solid rgba(255, 215, 0, 0.6);
}

.logo-text h1 {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 900;
  background: linear-gradient(90deg, #ffd700, #fff1a8, #ffd700, #f0a500);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
  animation: shimmer 3s linear infinite;
  text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
}

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.logo-text span {
  font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 1px;
}

.gas-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent-red);
}

.status-dot.connected {
  background: var(--accent-green);
  box-shadow: 0 0 8px var(--accent-green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Tabs */
.tab-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 20px 0;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  padding: 10px 18px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab-btn:hover { color: var(--accent-gold); background: var(--bg-card); }

.tab-btn.active {
  color: #ffd700;
  background: var(--bg-card);
  border-bottom: 2px solid #ffd700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
}

/* Main content */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 20px 40px;
}

/* Cards */
.card {
  background: linear-gradient(145deg, var(--bg-card) 0%, #15121e 100%);
  border: 1px solid var(--border-gold);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 1px rgba(255,215,0,0.1);
}

.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #ffd700;
}

.card-title .icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* Bingo Ball Grid */
.ball-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
}

.ball {
  aspect-ratio: 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  background: var(--bg-secondary);
  color: var(--text-secondary);
}

.ball:hover {
  transform: scale(1.1);
  border-color: var(--accent-gold);
  box-shadow: 0 0 10px var(--glow-gold);
}

.ball.hot {
  background: linear-gradient(135deg, #ff1a1a, #ff6600, #ff4400);
  color: #fff;
  border-color: #ff4400;
  box-shadow: 0 0 14px rgba(255, 68, 0, 0.6), 0 0 4px rgba(255, 26, 26, 0.4);
}

.ball.warm {
  background: linear-gradient(135deg, #b8860b, #daa520);
  color: #fff;
  border-color: #daa520;
}

.ball.cold {
  background: linear-gradient(135deg, #e0f2fe, #7dd3fc, #38bdf8);
  color: #0c4a6e;
  border-color: #7dd3fc;
  box-shadow: 0 0 12px rgba(125, 211, 252, 0.5), 0 0 4px rgba(255, 255, 255, 0.3);
}

.ball.selected {
  border-color: var(--accent-gold) !important;
  box-shadow: 0 0 15px var(--glow-gold) !important;
  transform: scale(1.15);
}

.ball.drawn {
  background: linear-gradient(135deg, #ff1a1a, #ff6600);
  color: #1a0a00;
  border-color: #ffd700;
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
}

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-secondary);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}

/* History table */
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.history-table th {
  background: linear-gradient(135deg, #1a1520, #231f30);
  padding: 10px 8px;
  text-align: left;
  color: #ffd700;
  font-weight: 700;
  border-bottom: 2px solid rgba(255, 215, 0, 0.3);
  position: sticky;
  top: 0;
}

.history-table td {
  padding: 8px;
  border-bottom: 1px solid rgba(255, 215, 0, 0.08);
  vertical-align: top;
}

.history-table tr:hover td {
  background: rgba(255, 215, 0, 0.05);
}

.drawn-nums {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.drawn-nums .mini-ball {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid rgba(255, 215, 0, 0.15);
}

.drawn-nums .mini-ball.super {
  background: linear-gradient(135deg, #ff1a1a, #ff6600);
  color: #1a0a00;
  border-color: #ffd700;
  box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
}

/* Prediction Panel */
.predict-result {
  background: linear-gradient(135deg, #1a1520, #0f0d18, #1a1020);
  border: 1px solid rgba(255, 215, 0, 0.3);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.08);
}

.predict-nums {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: 16px 0;
}

.predict-nums .p-ball {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 900;
  background: linear-gradient(135deg, #ffd700, #f0a500, #d4850a);
  color: #1a0a00;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), inset 0 2px 0 rgba(255,255,255,0.3);
  border: 1px solid rgba(255, 255, 200, 0.4);
  animation: popIn 0.3s ease-out backwards;
}

@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.predict-nums .p-ball:nth-child(1) { animation-delay: 0s; }
.predict-nums .p-ball:nth-child(2) { animation-delay: 0.05s; }
.predict-nums .p-ball:nth-child(3) { animation-delay: 0.1s; }
.predict-nums .p-ball:nth-child(4) { animation-delay: 0.15s; }
.predict-nums .p-ball:nth-child(5) { animation-delay: 0.2s; }
.predict-nums .p-ball:nth-child(6) { animation-delay: 0.25s; }
.predict-nums .p-ball:nth-child(7) { animation-delay: 0.3s; }
.predict-nums .p-ball:nth-child(8) { animation-delay: 0.35s; }
.predict-nums .p-ball:nth-child(9) { animation-delay: 0.4s; }
.predict-nums .p-ball:nth-child(10) { animation-delay: 0.45s; }

/* Stats */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.stat-box {
  background: linear-gradient(145deg, var(--bg-secondary), #1a1520);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
  border: 1px solid rgba(255, 215, 0, 0.1);
}

.stat-value {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(90deg, #ffd700, #fff1a8, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Frequency bar */
.freq-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.freq-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  width: 24px;
  text-align: right;
  color: var(--text-secondary);
}

.freq-bar {
  flex: 1;
  height: 18px;
  background: var(--bg-secondary);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.freq-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
  display: flex;
  align-items: center;
  padding-left: 6px;
  font-size: 10px;
  font-weight: 700;
  color: #000;
}

/* Input area */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.input-row input, .input-row select {
  flex: 1;
  min-width: 0;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.input-row input:focus, .input-row select:focus {
  border-color: var(--accent-cyan);
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: linear-gradient(135deg, #ffd700, #f0a500, #d4850a);
  color: #1a0a00;
  box-shadow: 0 2px 15px rgba(255, 215, 0, 0.3);
}

.btn-primary:hover {
  box-shadow: 0 4px 25px rgba(255, 215, 0, 0.5);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 1px solid rgba(255, 215, 0, 0.2);
}

.btn-secondary:hover {
  border-color: #ffd700;
  box-shadow: 0 0 10px rgba(255, 215, 0, 0.15);
}

.btn-cyan {
  background: linear-gradient(135deg, var(--accent-cyan), #0891b2);
  color: #000;
}

/* Settings */
.settings-group {
  margin-bottom: 16px;
}

.settings-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
}

.settings-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
}

.settings-input:focus { border-color: var(--accent-cyan); }

.notice {
  background: rgba(246, 195, 67, 0.08);
  border: 1px solid rgba(246, 195, 67, 0.2);
  border-radius: 8px;
  padding: 12px;
  font-size: 11px;
  color: var(--accent-gold);
  line-height: 1.6;
}

/* Scrollable table wrapper */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 8px;
  border: 1px solid var(--border);
}

/* Responsive */
@media (max-width: 600px) {
  .ball-grid { grid-template-columns: repeat(8, 1fr); gap: 4px; }
  .ball { font-size: 11px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .header-inner { flex-direction: column; gap: 8px; align-items: flex-start; }
  .predict-nums .p-ball { width: 36px; height: 36px; font-size: 13px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ===== CONFIG =====
// ★★★ 在這裡貼上你的 GAS Web App URL ★★★
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzLP17hk-B2JeouOnQj4-eTfpaRREV0jCpYcMekNqKIjlsDx9Foh8iJA8r0tVNNsZ84/exec';
// 範例: const GAS_URL = 'https://script.google.com/macros/s/xxxxxxx/exec';

// ===== DEMO DATA GENERATOR =====
function generateDemoData(count = 50) {
  const data = [];
  const now = Date.now();
  for (let i = 0; i < count; i++) {
    const nums = [];
    const pool = Array.from({length: 80}, (_, j) => j + 1);
    for (let j = 0; j < 20; j++) {
      const idx = Math.floor(Math.random() * pool.length);
      nums.push(pool.splice(idx, 1)[0]);
    }
    nums.sort((a, b) => a - b);
    const superNum = nums[Math.floor(Math.random() * 20)];
    const total = nums.reduce((s, n) => s + n, 0);
    data.push({
      period: `115${String(4000 - i).padStart(5, '0')}`,
      date: (() => { const d = new Date(now - i * 5 * 60000); const roc = d.getFullYear() - 1911; return roc + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); })(),
      numbers: nums,
      superNumber: superNum,
      total,
      bigSmall: total > 810 ? '大' : total < 810 ? '小' : '和',
      oddEven: total % 2 === 1 ? '單' : '雙',
    });
  }
  return data;
}

// ===== ANALYSIS FUNCTIONS =====
function analyzeFrequency(data, lastN = 30) {
  const freq = {};
  for (let i = 1; i <= 80; i++) freq[i] = 0;
  const slice = data.slice(0, lastN);
  slice.forEach(d => d.numbers.forEach(n => freq[n]++));
  return freq;
}

function getHotCold(freq, threshold) {
  const entries = Object.entries(freq).map(([k, v]) => [+k, v]);
  const avg = entries.reduce((s, [_, v]) => s + v, 0) / entries.length;
  const hot = entries.filter(([_, v]) => v >= avg * 1.3).map(([k]) => k);
  const cold = entries.filter(([_, v]) => v <= avg * 0.7).map(([k]) => k);
  const warm = entries.filter(([_, v]) => v > avg * 0.7 && v < avg * 1.3).map(([k]) => k);
  return { hot, cold, warm, avg };
}

function predictNumbers(data, strategy = 'balanced', count = 10, analysisRange = 30) {
  if (data.length < 5) {
    const pool = Array.from({length: 80}, (_, i) => i + 1);
    const picks = [];
    for (let i = 0; i < count; i++) {
      const idx = Math.floor(Math.random() * pool.length);
      picks.push(pool.splice(idx, 1)[0]);
    }
    return picks.sort((a, b) => a - b);
  }

  const freq = analyzeFrequency(data, analysisRange);
  const { hot, cold } = getHotCold(freq);
  
  // Consecutive appearance tracking
  const lastDrawn = data[0]?.numbers || [];
  const prev2 = data[1]?.numbers || [];
  const consecutive = lastDrawn.filter(n => prev2.includes(n));

  let candidates = [];
  
  switch (strategy) {
    case 'hot':
      // Favor hot numbers
      candidates = [...hot];
      if (candidates.length < count) {
        const rest = Array.from({length: 80}, (_, i) => i + 1).filter(n => !candidates.includes(n));
        rest.sort((a, b) => (freq[b] || 0) - (freq[a] || 0));
        candidates.push(...rest.slice(0, count - candidates.length));
      }
      break;
    case 'cold':
      // Favor cold numbers (due rebound)
      candidates = [...cold];
      if (candidates.length < count) {
        const rest = Array.from({length: 80}, (_, i) => i + 1).filter(n => !candidates.includes(n));
        rest.sort((a, b) => (freq[a] || 0) - (freq[b] || 0));
        candidates.push(...rest.slice(0, count - candidates.length));
      }
      break;
    case 'balanced':
    default:
      // Mix: 40% hot, 30% cold, 30% consecutive/random
      const hotPick = Math.ceil(count * 0.4);
      const coldPick = Math.ceil(count * 0.3);
      const randPick = count - hotPick - coldPick;
      
      const shuffledHot = [...hot].sort(() => Math.random() - 0.5);
      const shuffledCold = [...cold].sort(() => Math.random() - 0.5);
      
      candidates.push(...shuffledHot.slice(0, hotPick));
      candidates.push(...shuffledCold.slice(0, coldPick));
      
      // Fill with consecutive or random
      const used = new Set(candidates);
      const consUnused = consecutive.filter(n => !used.has(n));
      consUnused.sort(() => Math.random() - 0.5);
      candidates.push(...consUnused.slice(0, randPick));
      
      if (candidates.length < count) {
        const remaining = Array.from({length: 80}, (_, i) => i + 1).filter(n => !new Set(candidates).has(n));
        remaining.sort(() => Math.random() - 0.5);
        candidates.push(...remaining.slice(0, count - candidates.length));
      }
      break;
  }
  
  return candidates.slice(0, count).sort((a, b) => a - b);
}

// ===== COMPONENTS =====

function Header({ onRefresh, refreshing }) {
  const [textIdx, setTextIdx] = useState(0);
  
  const idleTexts = ['更新開獎', '試試手氣', '財神快來'];
  const loadingTexts = ['開獎中...', '財神降臨...', '發財啦...'];
  
  useEffect(() => {
    const timer = setInterval(() => {
      setTextIdx(prev => (prev + 1) % 3);
    }, 2000);
    return () => clearInterval(timer);
  }, []);

  return (
    <header className="app-header">
      <div className="header-inner">

// ===== TAB: Frequency =====
function FrequencyTab({ data }) {
  const [period, setPeriod] = useState(30);
  const freq = useMemo(() => analyzeFrequency(data, period), [data, period]);
  const maxFreq = Math.max(...Object.values(freq));
  
  const sorted = Object.entries(freq)
    .map(([k, v]) => [+k, v])
    .sort((a, b) => b[1] - a[1]);

  const top10 = sorted.slice(0, 10);
  const bottom10 = sorted.slice(-10).reverse();

  return (
    <div>
      <div className="card">
        <div className="card-title">
          <span className="icon" style={{background: 'rgba(244,114,182,0.15)', color: 'var(--accent-pink)'}}>📈</span>
          必殺分析
        </div>
        <div className="input-row" style={{marginBottom: 16}}>
          <select value={period} onChange={e => setPeriod(+e.target.value)} style={{flex: 'none', width: 'auto'}}>
            <option value="10">近 10 期</option>
            <option value="20">近 20 期</option>
            <option value="30">近 30 期</option>
            <option value="50">近 50 期</option>
            <option value="999">全部</option>
          </select>
        </div>
        
        <div style={{marginBottom: 20}}>
          <div style={{fontSize: 13, fontWeight: 700, marginBottom: 8, color: 'var(--accent-red)'}}>🔥 最熱 Top 10</div>
          {top10.map(([num, cnt]) => (
            <div key={num} className="freq-bar-wrap">
              <div className="freq-num">{String(num).padStart(2, '0')}</div>
              <div className="freq-bar">
                <div className="freq-bar-fill" style={{
                  width: `${(cnt / maxFreq) * 100}%`,
                  background: `linear-gradient(90deg, #ff1a1a, #ff6600)`,
                }}>
                  {cnt}
                </div>
              </div>
            </div>
          ))}
        </div>

        <div>
          <div style={{fontSize: 13, fontWeight: 700, marginBottom: 8, color: 'var(--accent-cyan)'}}>❄️ 最冷 Bottom 10</div>
          {bottom10.map(([num, cnt]) => (
            <div key={num} className="freq-bar-wrap">
              <div className="freq-num">{String(num).padStart(2, '0')}</div>
              <div className="freq-bar">
                <div className="freq-bar-fill" style={{
                  width: `${Math.max((cnt / maxFreq) * 100, 3)}%`,
                  background: `linear-gradient(90deg, #e0f2fe, #38bdf8)`,
                }}>
                  {cnt}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [data, setData] = useState([]);
  const [isConnected, setIsConnected] = useState(false);
  const [refreshing, setRefreshing] = useState(false);

  // 載入資料（只讀取）
  const syncData = useCallback(function(actionType) {
    if (!GAS_URL) return;
    var action = actionType || 'getData';
    if (action === 'fetchAndGet') setRefreshing(true);
    var xhr = new XMLHttpRequest();
    xhr.open('GET', GAS_URL + '?action=' + action + '&limit=500&_t=' + Date.now(), true);
    xhr.onload = function() {
      try {
        var json = JSON.parse(xhr.responseText);
        if (json.data && json.data.length > 0) {
          json.data.sort(function(a, b) {
            return b.period.localeCompare(a.period);
          });
          setData(json.data);
          setIsConnected(true);
        }
      } catch(e) {}
      setRefreshing(false);
    };
    xhr.onerror = function() {
      setIsConnected(false);
      setRefreshing(false);
    };
    xhr.send();
  }, []);

  // 客人按更新：先抓新資料再回傳
  const handleRefresh = useCallback(function() {
    syncData('fetchAndGet');
  }, [syncData]);

  // 初始載入
  useEffect(() => {
    if (GAS_URL) {
      syncData('getData');
    } else {
      setData(generateDemoData(200));
    }
  }, []);

  const tabs = [
    { id: 'dashboard', label: '總覽', icon: '📊' },
    { id: 'prediction', label: '發財', icon: '💰' },
    { id: 'history', label: '紀錄', icon: '📜' },
    { id: 'frequency', label: '必殺', icon: '🔥' },
  ];

  return (
    <div>
      <Header onRefresh={handleRefresh} refreshing={refreshing} />
      <TabBar tabs={tabs} active={activeTab} onChange={setActiveTab} />
      <div className="main-content">
        <div style={{display: activeTab === 'dashboard' ? 'block' : 'none'}}><DashboardTab data={data} /></div>
        <div style={{display: activeTab === 'prediction' ? 'block' : 'none'}}><PredictionTab data={data} /></div>
        <div style={{display: activeTab === 'history' ? 'block' : 'none'}}><HistoryTab data={data} /></div>
        <div style={{display: activeTab === 'frequency' ? 'block' : 'none'}}><FrequencyTab data={data} /></div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
